# ========================================
# NOTIFICATION SERVICE - CONFIGURATION
# ========================================

# ========================================
# 1. APPLICATION CONFIGURATION
# ========================================
spring.application.name=notification-service
server.port=8083

# ========================================
# 2. KAFKA CONFIGURATION
# ========================================
# Bootstrap servers - Địa chỉ broker Kafka
spring.kafka.bootstrap-servers=localhost:9092

# Consumer Configuration - Cấu hình Consumer
# Group ID - Định danh nhóm consumer
spring.kafka.consumer.group-id=notification-service-group

# Auto offset reset - Xử lý khi offset không tồn tại
spring.kafka.consumer.auto-offset-reset=earliest

# Key Deserializer - Deserializer cho key (String)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Value Deserializer - Deserializer cho value (JSON)
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# JSON Deserialization Configuration
spring.kafka.consumer.properties.spring.json.type.mapping=orderPlacedEvent:com.hdbank.notificationservice.dto.OrderPlacedEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Producer Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Auto commit configuration
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.consumer.auto-commit-interval-ms=1000

# Max poll records - Số record tối đa mỗi lần poll
spring.kafka.consumer.max-poll-records=100

# ========================================
# 3. EUREKA CLIENT CONFIGURATION
# ========================================
# Eureka Server URL
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka

# IP Address configuration
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost

# Health check URL
eureka.instance.health-check-url-path=/actuator/health

# ========================================
# 4. ACTUATOR & HEALTH CHECK CONFIGURATION
# ========================================
# Expose các endpoints của Actuator (liveness/readiness là subgroups của health)
management.endpoints.web.exposure.include=health,prometheus,info,metrics

# Health endpoint configuration
management.endpoint.health.show-details=always

# Enable liveness and readiness probes (chúng sẽ tự động tạo /health/liveness và /health/readiness)
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ========================================
# 5. PROMETHEUS METRICS CONFIGURATION
# ========================================
management.metrics.export.prometheus.enabled=true

# ========================================
# 6. ZIPKIN TRACING CONFIGURATION
# ========================================
management.tracing.sampling.probability=1.0

# ========================================
# 7. LOGGING CONFIGURATION
# ========================================
logging.level.root=INFO
logging.level.com.hdbank.notificationservice=DEBUG
logging.level.org.springframework.kafka=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
